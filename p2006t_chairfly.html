<title>P2006T Chairfly — G1000</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; width: 100vw; height: 100vh; overflow: hidden; position: relative; }

/* ── PORTRAIT OVERLAY ── */
#portrait-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  flex-direction: column;
  align-items: center; justify-content: center;
  color: #fff; font-family: 'Courier New', monospace; text-align: center; gap: 18px;
}
#portrait-overlay svg { animation: rotate-hint 2s ease-in-out infinite; }
@keyframes rotate-hint {
  0%,100% { transform: rotate(0deg); }
  40%,60% { transform: rotate(90deg); }
}
@media (orientation: portrait) {
  #portrait-overlay { display: flex; }
}
#app { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; color: #e0e0e0; font-family: 'Courier New', monospace; }

/* ── TOP HALF ── */
#top-half { flex: 0 0 56%; position: relative; overflow: hidden; border-bottom: 3px solid #222; }
#sky-canvas { width: 100%; height: 100%; display: block; }
#maneuver-title { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.65); border: 1px solid #4af; border-radius: 4px; padding: 5px 22px; font-size: 16px; color: #4af; letter-spacing: 1px; white-space: nowrap; z-index: 10; }
#view-badge { position: absolute; top: 14px; right: 18px; background: rgba(0,0,0,0.5); border: 1px solid #555; border-radius: 3px; padding: 3px 10px; font-size: 12px; color: #aaa; z-index: 10; }
#step-box { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); border: 1px solid #fa0; border-radius: 5px; padding: 7px 20px; font-size: 15px; color: #fa0; min-width: 360px; max-width: 65%; text-align: center; z-index: 10; min-height: 36px; }

/* ── BOTTOM HALF ── */
#bottom-half { flex: 1; display: flex; flex-direction: row; overflow: hidden; min-height: 0; }

/* Sidebar */
#sidebar { width: 195px; min-width: 195px; background: #0d0d0d; border-right: 1px solid #2a2a2a; overflow-y: auto; padding: 4px 0; }
#sidebar::-webkit-scrollbar { width: 3px; }
#sidebar::-webkit-scrollbar-thumb { background: #333; }
.sidebar-item { padding: 6px 11px; font-size: 13px; cursor: pointer; border-left: 3px solid transparent; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: all 0.12s; }
.sidebar-item:hover { background: #181818; color: #ccc; }
.sidebar-item.active { border-left-color: #4af; color: #4af; background: #131c24; }

/* Bezel units — flex:1 each, PNG overlay */
.bezel-unit { flex: 1; position: relative; overflow: hidden; min-width: 0; background: #0c0c0e; }
.bezel-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; pointer-events: none; z-index: 2; }

/* Screen area offset inside 1716×1092 PNG:
   left=210px, top=39px (=1092-111-942), width=1300px, height=942px */
#pfd-canvas {
  position: absolute;
  left: 12.24%; top: 3.57%; width: 75.76%; height: 86.26%;
  display: block; background: #050810; z-index: 1;
}
#mfd-screen {
  position: absolute;
  left: 12.24%; top: 3.57%; width: 75.76%; height: 86.26%;
  display: flex; flex-direction: column; overflow: hidden;
  background: #050608; z-index: 1;
}
.btn { background: #161618; border: 1px solid #383838; color: #aaa; padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.12s; }
.btn:hover { background: #1e1e22; border-color: #4af; color: #4af; }
.btn.active { background: #08101e; border-color: #4af; color: #4af; }

/* Gear Column */
#gear-col { width: 64px; min-width: 64px; background: #0a0a0c; border-left: 1px solid #1c1c1e; border-right: 1px solid #1c1c1e; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
.gear-col-label { font-size: 7px; letter-spacing: 2px; color: #3a3a3a; text-align: center; font-family: 'Courier New', monospace; }
#gear-indicator { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.gear-dot-row { display: flex; gap: 11px; }
.gear-dot { width: 12px; height: 12px; border-radius: 50%; background: #252525; border: 1px solid #333; transition: all 0.3s; }
.gear-dot.green { background: #00dd00; box-shadow: 0 0 8px #0d0; border-color: #0f0; }
#gear-knob-btn { width: 42px; height: 42px; border-radius: 50%; background: radial-gradient(circle at 36% 30%, #3c3c42, #0e0e10); border: 2px solid #3a3a3a; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; cursor: default; }
#gear-knob-btn span { font-size: 7px; color: #555; letter-spacing: 0.5px; }
/* Flap Lever */
#flap-track-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#flap-track { position: relative; width: 2px; height: 52px; background: #3a3a3a; border-radius: 1px; }
#flap-bar { position: absolute; left: 50%; transform: translateX(-50%); width: 44px; height: 14px; background: #b87000; border: 1px solid #e89000; border-radius: 2px; display: flex; align-items: center; justify-content: center; top: 0; transition: top 0.3s ease; }
#flap-bar span { font-size: 8px; font-weight: bold; color: #ffe080; letter-spacing: 1px; font-family: 'Courier New', monospace; }

/* MFD bezel — same bezel-unit base, content inside #mfd-screen */
#mfd { /* extends .bezel-unit */ }
#mfd-header { background: #07080a; border-bottom: 1px solid #181818; padding: 4px 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
#mfd-header span { font-size: 11px; letter-spacing: 2px; color: #4af; }
#mfd-tabs { display: flex; border-bottom: 1px solid #181818; flex-shrink: 0; }
.mfd-tab { flex: 1; padding: 6px 4px; text-align: center; font-size: 11px; letter-spacing: 1px; cursor: pointer; color: #3a3a3a; border-right: 1px solid #181818; transition: all 0.12s; }
.mfd-tab:last-child { border-right: none; }
.mfd-tab:hover { color: #aaa; background: #0e0e12; }
.mfd-tab.active { color: #4af; background: #07101a; border-bottom: 2px solid #4af; }
.mfd-tab.emg-tab.active { color: #f66; border-bottom-color: #f44; background: #100808; }
#mfd-body { flex: 1; overflow-y: auto; padding: 8px 7px; }
#mfd-body::-webkit-scrollbar { width: 3px; }
#mfd-body::-webkit-scrollbar-thumb { background: #1c1c1c; }

/* Right Panel — Callouts & Controls */
#right-panel { width: 215px; min-width: 215px; background: #080808; border-left: 1px solid #1a1a1a; display: flex; flex-direction: column; overflow: hidden; }
#rp-header { background: #090909; border-bottom: 1px solid #1c1c1e; padding: 6px 10px; font-size: 10px; letter-spacing: 2px; color: #888; flex-shrink: 0; }
#rp-callout { padding: 10px 10px; border-bottom: 1px solid #161618; flex-shrink: 0; }
#rp-callout-text { font-size: 15px; color: #fa0; line-height: 1.5; min-height: 42px; }
#rp-controls { position: absolute; top: 52px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; align-items: center; padding: 5px 14px; background: rgba(0,0,0,0.55); border: 1px solid #333; border-radius: 4px; z-index: 10; }
#rp-prog { flex: 1; height: 4px; background: #1e1e1e; border-radius: 2px; cursor: pointer; }
#rp-prog-fill { height: 100%; background: #4af; border-radius: 2px; width: 0%; }
#rp-time { font-size: 11px; color: #444; min-width: 36px; text-align: right; }
#rp-steps { flex: 1; overflow-y: auto; padding: 8px 10px; }
#rp-steps::-webkit-scrollbar { width: 3px; }
#rp-steps::-webkit-scrollbar-thumb { background: #1e1e1e; }
.rp-step { padding: 4px 6px; border-left: 2px solid #1e1e1e; margin-bottom: 4px; color: #3a3a3a; font-size: 13px; line-height: 1.4; transition: all 0.15s; }
.rp-step.current { border-left-color: #fa0; color: #fa0; background: rgba(255,170,0,0.05); }
.rp-step.done { border-left-color: #1e3a1e; color: #2a4a2a; }


/* MFD Checklist */
.cl-section { margin-bottom: 10px; }
.cl-sec-title { font-size: 11px; letter-spacing: 2px; color: #4af; margin-bottom: 5px; padding-bottom: 3px; border-bottom: 1px solid #1a2a1a; }
.cl-sec-title.emg { color: #f44; border-bottom-color: #2a1a1a; }
.cl-panel-mfd { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 5px; padding: 8px 9px; margin-bottom: 7px; }
.cl-panel-mfd.emg { border-color: #2a1515; }
.cl-ptitle { font-size: 12px; font-weight: bold; letter-spacing: 0.5px; color: #4af; margin-bottom: 5px; }
.cl-ptitle.emg { color: #f66; }
.cl-step { display: flex; gap: 5px; font-size: 12px; color: #aaa; padding: 2px 0; line-height: 1.45; }
.cl-step b { color: #fff; }
.cl-step.emg b { color: #f99; }
.cl-num { color: #444; min-width: 20px; font-size: 11px; padding-top: 1px; flex-shrink: 0; }
.cl-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
.cl-tab { flex: 1; padding: 5px; text-align: center; font-size: 11px; letter-spacing: 1px; cursor: pointer; border: 1px solid #333; border-radius: 3px; color: #666; transition: all 0.12s; }
.cl-tab:hover { color: #aaa; }
.cl-tab.active { color: #4af; border-color: #4af; background: #0a1520; }
.cl-tab.emg.active { color: #f66; border-color: #f44; background: #1a0a0a; }
</style>
</head>

<script>
// ─── FULLSCREEN ──────────────────────────────────────────────
function enterFullscreen(){
  const el=document.documentElement;
  try {
    if(el.requestFullscreen){ const p=el.requestFullscreen(); if(p&&p.catch) p.catch(()=>showFsToast()); }
    else if(el.webkitRequestFullscreen){ el.webkitRequestFullscreen(); }
    else if(el.mozRequestFullScreen){ el.mozRequestFullScreen(); }
    else { showFsToast(); }
  } catch(e){ showFsToast(); }
}
function showFsToast(){
  let t=document.getElementById('fs-toast');
  if(!t){
    t=document.createElement('div');
    t.id='fs-toast';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid #4af;color:#ccc;font-family:Courier New,monospace;font-size:13px;padding:10px 18px;border-radius:6px;z-index:9998;text-align:center;max-width:90vw;line-height:1.5;';
    document.body.appendChild(t);
  }
  t.innerHTML='Fullscreen not supported in this browser.<br><span style="color:#4af">Safari: Share → Add to Home Screen</span><br>for a permanent fullscreen experience.';
  t.style.display='block';
  clearTimeout(t._to);
  t._to=setTimeout(()=>{ t.style.display='none'; }, 5000);
}
function exitFullscreen(){
  try {
    if(document.exitFullscreen){ const p=document.exitFullscreen(); if(p&&p.catch) p.catch(()=>{}); }
    else if(document.webkitExitFullscreen){ document.webkitExitFullscreen(); }
    else if(document.mozCancelFullScreen){ document.mozCancelFullScreen(); }
  } catch(e){}
}
function isFullscreen(){
  return !!(document.fullscreenElement||document.webkitFullscreenElement||document.mozFullScreenElement);
}
function toggleFullscreen(){ isFullscreen()?exitFullscreen():enterFullscreen(); }
function updateFsBtn(){
  const btn=document.getElementById('btn-fs');
  if(!btn) return;
  btn.textContent=isFullscreen()?'✕':'⛶';
  btn.classList.toggle('active',isFullscreen());
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(e=>document.addEventListener(e,updateFsBtn));

// ─── ORIENTATION LOCK ────────────────────────────────────────
(function(){
  try {
    if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{});
    }
  } catch(e){}
})();

// ─── STATE ───────────────────────────────────────────────────
let selIdx = -1, playing = false, animTime = 0, animStart = null, rafId = null, trailPts = [];
let mfdPage = 'normal';
let hdgTimeline = []; // [{t, hdg}] precomputed per maneuver

function precomputeHeadings(m){
  hdgTimeline = [];
  const dt = 0.1;
  let hdg = m.initHdg || 0;
  for(let t=0; t<=m.duration+dt; t+=dt){
    hdgTimeline.push({t, hdg});
    const st = interp(m, t);
    const tas = Math.max(st.ias, 50);
    // turn rate (°/s) = 1091 × tan(bank_rad) / TAS_kts / 60
    // negative bank = left turn = heading decreases
    const turnRate = 1091 * Math.tan(st.bank * Math.PI/180) / tas / 60;
    hdg += turnRate * dt;
  }
}

function getHeadingAt(t){
  if(!hdgTimeline.length) return 0;
  for(let i=0; i<hdgTimeline.length-1; i++){
    if(t<=hdgTimeline[i+1].t){
      const f=(t-hdgTimeline[i].t)/(hdgTimeline[i+1].t-hdgTimeline[i].t);
      return lerp(hdgTimeline[i].hdg, hdgTimeline[i+1].hdg, f);
    }
  }
  return hdgTimeline[hdgTimeline.length-1].hdg;
}
const skyC = document.getElementById('sky-canvas');
const skyX = skyC.getContext('2d');
const pfdC = document.getElementById('pfd-canvas');
const pfdX = pfdC.getContext('2d');

const sbar = document.getElementById('sidebar');
MANEUVERS.forEach((m,i)=>{

  el.addEventListener('click',()=>selectManeuver(i)); sbar.appendChild(el);
});

function selectManeuver(i){
  document.querySelectorAll('.sidebar-item').forEach((e,j)=>e.classList.toggle('active',j===i));
  selIdx=i; stopAnim(); animTime=0; trailPts=[];
  const m=MANEUVERS[i];
  precomputeHeadings(m);
  document.getElementById('maneuver-title').textContent=m.name.toUpperCase();
  document.getElementById('view-badge').textContent=m.view==='side'?'SIDE VIEW':'TOP VIEW';
  // Populate right panel steps
  const rpS=document.getElementById('rp-steps');
  if(rpS) rpS.innerHTML=buildRightSteps(m);
  renderMFD();
  renderFrame(m,0);
}

// ─── INTERP ──────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function interp(m,t){
  const k=m.keyframes;
  if(t<=k[0].t) return {...k[0]};
  if(t>=k[k.length-1].t) return {...k[k.length-1]};
  let lo=0;
  for(let i=0;i<k.length-1;i++) if(t>=k[i].t&&t<=k[i+1].t){lo=i;break;}
  const a=k[lo],b=k[lo+1],f=(t-a.t)/(b.t-a.t);
  return {x:lerp(a.x,b.x,f),y:lerp(a.y||0,b.y||0,f),alt:lerp(a.alt,b.alt,f),
    ias:lerp(a.ias,b.ias,f),pitch:lerp(a.pitch,b.pitch,f),bank:lerp(a.bank,b.bank,f),
    mp:lerp(a.mp,b.mp,f),gear:f<.5?a.gear:b.gear,flaps:f<.5?a.flaps:b.flaps,
    eng:f<.5?a.eng:b.eng,callout:f<.5?a.callout:b.callout,kfIdx:f<.5?lo:lo+1};
}
function getVSI(m,t){
  const s0=interp(m,Math.max(0,t-1)),s1=interp(m,t);
  return (s1.alt-s0.alt)*5000*60;
}
function isCruiseMvr(m){
  const minAlt = Math.min(...m.keyframes.map(k=>k.alt));
  return m.keyframes[0].alt >= 0.3 && minAlt > 0.03;
}
function getCanvasXY(m,st,W,H){
  if(m.view==='side'){
    if(isCruiseMvr(m)) return {cx:W*(0.04+st.x*0.92), cy:H*(1.1-st.alt*1.5)};
    return {cx:W*(0.04+st.x*0.92),cy:H*(0.85-st.alt*0.78)};
  }
  return {cx:W*(0.04+st.x*0.92),cy:H*(0.04+st.y*0.92)};
}

// ─── RENDER FRAME ────────────────────────────────────────────
function renderFrame(m,t){
  const W=skyC.width,H=skyC.height;
  const st=interp(m,t);
  const vsi=getVSI(m,t);
  const altFt=Math.round(st.alt*5000);
  drawSkyScene(m,st,t,W,H);
  // Right panel — callout + progress
  const rpCO = document.getElementById('rp-callout-text');
  if(rpCO) rpCO.textContent = st.callout;
  const pct = m.duration>0 ? Math.min(100,(t/m.duration)*100) : 0;
  const rpPF = document.getElementById('rp-prog-fill');
  if(rpPF) rpPF.style.width = pct+'%';
  const rpTm = document.getElementById('rp-time');
  if(rpTm) rpTm.textContent = t.toFixed(1)+'s';
  // Also keep sky overlay callout
  document.getElementById('step-box').textContent = st.callout;
  // PFD
  drawPFD(st,altFt,Math.round(vsi),getHeadingAt(t));
  // Gear indicator
  updateGearIndicator(st.gear);
  // Flap lever
  updateFlapLever(st.flaps);
  // MFD header status
  const hdrEl = document.getElementById('mfd-flap-eng');
  if(hdrEl) hdrEl.textContent = 'F:'+st.flaps+'  '+(st.eng==='FAIL'?'S/E':'BOTH');
  // Right panel steps
  updateRightSteps(m,t);
}

// ─── SKY SCENE ───────────────────────────────────────────────
function drawSkyScene(m,st,t,W,H){
  skyX.clearRect(0,0,W,H);
  if(m.view==='side') drawSideView(m,st,t,W,H);
  else drawTopView(m,st,t,W,H);
}

function drawSideView(m,st,t,W,H){
  // Sky gradient (shared)
  const sg=skyX.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#061828'); sg.addColorStop(.55,'#0d3a5e'); sg.addColorStop(1,'#1a5a8a');
  skyX.fillStyle=sg; skyX.fillRect(0,0,W,H);

  if(isCruiseMvr(m)){
    // ── Cruise: blue sky only, hard deck relative to aircraft ──
    // Altitude scale (cruise formula)
    skyX.font='11px Courier New';
    for(let a=0;a<=5000;a+=1000){
      const yy=H*(1.1-a/5000*1.5);
      if(yy<0||yy>H) continue;
      skyX.strokeStyle='rgba(255,255,255,0.18)'; skyX.lineWidth=.5;
      skyX.beginPath(); skyX.moveTo(W-48,yy); skyX.lineTo(W-8,yy); skyX.stroke();
      skyX.fillStyle='rgba(255,255,255,0.4)'; skyX.fillText(a+"'",W-46,yy-3);
    }
    drawTrail(m,W,H);
    const p=getCanvasXY(m,st,W,H);
    trailPts.push({...p,t});
    // Hard deck drawn visually below the aircraft
    const decks=getHardDecks(m);
    const deckLabel=decks.length>0?decks[0].label:'HARD DECK';
    const deckColor=decks.length>0?decks[0].color:'rgba(255,70,70,0.8)';
    const hardDeckY=Math.min(H-20, p.cy+H*0.38);
    skyX.save();
    skyX.strokeStyle=deckColor; skyX.lineWidth=1.5; skyX.setLineDash([10,5]);
    skyX.beginPath(); skyX.moveTo(0,hardDeckY); skyX.lineTo(W,hardDeckY); skyX.stroke();
    skyX.setLineDash([]); skyX.fillStyle=deckColor; skyX.font='11px Courier New';
    skyX.fillText(deckLabel,6,hardDeckY-4); skyX.restore();
    drawAirplaneSide(p.cx,p.cy,st.pitch,st.bank,st.eng,W,H);
  } else {
    // ── Takeoff/Landing/Approach: ground + runway ──
    const horizY=H*.85;
    const gg=skyX.createLinearGradient(0,horizY,0,H);
    gg.addColorStop(0,'#2a4218'); gg.addColorStop(1,'#162210');
    skyX.fillStyle=gg; skyX.fillRect(0,horizY,W,H-horizY);
    // Runway
    const rwX=W*.04;
    skyX.fillStyle='#383838'; skyX.fillRect(rwX,horizY-3,W*.25,7);
    skyX.fillStyle='#eee';
    for(let i=0;i<9;i++) skyX.fillRect(rwX+W*.025+i*W*.025,horizY-1,W*.015,3);
    // Altitude scale
    skyX.font='11px Courier New';
    for(let a=0;a<=5000;a+=1000){
      const yy=H*(.85-(a/5000)*.78);
      skyX.strokeStyle='rgba(255,255,255,0.18)'; skyX.lineWidth=.5;
      skyX.beginPath(); skyX.moveTo(W-48,yy); skyX.lineTo(W-8,yy); skyX.stroke();
      skyX.fillStyle='rgba(255,255,255,0.4)'; skyX.fillText(a+"'",W-46,yy-3);
    }
    // Hard decks
    getHardDecks(m).forEach(hd=>{
      const yy=H*(.85-(hd.alt/5000)*.78);
      skyX.save(); skyX.strokeStyle=hd.color; skyX.lineWidth=1.5; skyX.setLineDash([10,5]);
      skyX.beginPath(); skyX.moveTo(0,yy); skyX.lineTo(W,yy); skyX.stroke();
      skyX.setLineDash([]); skyX.fillStyle=hd.color; skyX.font='11px Courier New';
      skyX.fillText(hd.label,6,yy-4); skyX.restore();
    });
    drawTrail(m,W,H);
    const p=getCanvasXY(m,st,W,H);
    trailPts.push({...p,t});
    drawAirplaneSide(p.cx,p.cy,st.pitch,st.bank,st.eng,W,H);
  }
}

function drawTopView(m,st,t,W,H){
  skyX.fillStyle='#233218'; skyX.fillRect(0,0,W,H);
  // Grid
  skyX.strokeStyle='rgba(255,255,255,0.05)'; skyX.lineWidth=1;
  for(let x=0;x<W;x+=70){skyX.beginPath();skyX.moveTo(x,0);skyX.lineTo(x,H);skyX.stroke();}
  for(let y=0;y<H;y+=70){skyX.beginPath();skyX.moveTo(0,y);skyX.lineTo(W,y);skyX.stroke();}
  // Compass
  skyX.fillStyle='rgba(255,255,255,0.28)'; skyX.font='13px Courier New';
  skyX.fillText('N',W/2-5,16); skyX.fillText('S',W/2-5,H-4);
  skyX.fillText('W',5,H/2+5); skyX.fillText('E',W-14,H/2+5);
  // Ref circle for turns
  if(m.name.includes('Point')||m.name.includes('S-Turn')||m.name.includes('Rect')){
    skyX.fillStyle='#fa8'; skyX.beginPath(); skyX.arc(W*.5,H*.5,7,0,Math.PI*2); skyX.fill();
    skyX.strokeStyle='rgba(255,170,80,0.18)'; skyX.lineWidth=1; skyX.setLineDash([5,5]);
    skyX.beginPath(); skyX.arc(W*.5,H*.5,W*.26,0,Math.PI*2); skyX.stroke(); skyX.setLineDash([]);
  }
  // Runway for pattern maneuvers
  if(m.name.match(/Landing|Approach|Missed/)){
    skyX.fillStyle='#484848'; skyX.fillRect(W*.5-8,H*.90,16,H*.10);
    skyX.fillStyle='rgba(255,255,255,0.5)'; skyX.font='11px Courier New';
    skyX.fillText('RWY',W*.5-14,H*.99);
  }
  drawTrail(m,W,H);
  const p=getCanvasXY(m,st,W,H);
  trailPts.push({...p,t});
  drawAirplaneTop(p.cx,p.cy,st.bank,st.eng,W,H);
}

function catmullRomPath(ctx,pts,steps){
  if(pts.length<2) return;
  ctx.moveTo(pts[0].cx,pts[0].cy);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
    for(let j=1;j<=steps;j++){
      const t=j/steps,t2=t*t,t3=t2*t;
      const cx=0.5*((2*p1.cx)+(-p0.cx+p2.cx)*t+(2*p0.cx-5*p1.cx+4*p2.cx-p3.cx)*t2+(-p0.cx+3*p1.cx-3*p2.cx+p3.cx)*t3);
      const cy=0.5*((2*p1.cy)+(-p0.cy+p2.cy)*t+(2*p0.cy-5*p1.cy+4*p2.cy-p3.cy)*t2+(-p0.cy+3*p1.cy-3*p2.cy+p3.cy)*t3);
      ctx.lineTo(cx,cy);
    }
  }
}

function drawTrail(m,W,H){
  // Ghost path — keyframe waypoints connected with Catmull-Rom curves
  const pts=m.keyframes.map(kf=>{
    const s=m.view==='side'?{x:kf.x,alt:kf.alt}:{x:kf.x,y:kf.y||0,alt:kf.alt};
    return getCanvasXY(m,s,W,H);
  });
  skyX.beginPath(); skyX.strokeStyle='rgba(80,180,255,0.15)'; skyX.lineWidth=1.5; skyX.setLineDash([5,5]);
  catmullRomPath(skyX,pts,20);
  skyX.stroke(); skyX.setLineDash([]);
  // Active trail
  if(trailPts.length<2) return;
  skyX.beginPath(); skyX.strokeStyle='rgba(80,200,255,0.7)'; skyX.lineWidth=3;
  catmullRomPath(skyX,trailPts,8);
  skyX.stroke();
}

function getHardDecks(m){
  const n=m.name.toLowerCase(),d=[];
  if(n.match(/stall|slow flight|vmca|drag/)) d.push({alt:3000,label:'3000 AGL HARD DECK',color:'rgba(255,70,70,0.8)'});
  if(n.includes('vmca')) d.push({alt:4000,label:'4000 AGL MIN',color:'rgba(255,120,0,0.8)'});
  if(n.includes('s/e missed')) d.push({alt:500,label:'500 AGL MIN (S/E)',color:'rgba(255,70,70,0.8)'});
  return d;
}

// ─── AIRCRAFT ICONS ──────────────────────────────────────────
function drawAirplaneSide(cx,cy,pitch,bank,eng,W,H){
  // SVG aspect ratio 1920:642 ≈ 2.99
  const h = Math.min(W,H) * 0.09;
  const w = h * (1920/642);
  const img = eng === 'FAIL' ? sideImgFail : sideImgNorm;
  skyX.save();
  skyX.translate(cx, cy);
  skyX.rotate(-pitch * Math.PI/180);
  if(img.complete && img.naturalWidth) skyX.drawImage(img, -w/2, -h/2, w, h);
  skyX.restore();
}

function drawAirplaneTop(cx,cy,bank,eng,W,H){
  // Top view PNG — assume roughly square
  const s = Math.min(W,H) * 0.09;
  skyX.save();
  skyX.translate(cx, cy);
  skyX.rotate(bank * Math.PI/180);
  if(topImg.complete && topImg.naturalWidth){
    const ar = topImg.naturalWidth / topImg.naturalHeight;
    const tw = s * ar, th = s;
    if(eng==='FAIL'){
      skyX.drawImage(topImg, -tw/2, -th/2, tw, th);
      skyX.globalCompositeOperation = 'source-atop';
      skyX.fillStyle = 'rgba(255,120,40,0.7)';
      skyX.fillRect(-tw/2, -th/2, tw, th);
      skyX.globalCompositeOperation = 'source-over';
    } else {
      skyX.drawImage(topImg, -tw/2, -th/2, tw, th);
    }
  } else {
    // fallback
    const S = s * 0.5;
    const col = eng==='FAIL'?'#ff8844':'#fff';
    skyX.strokeStyle=col; skyX.lineWidth=2;
    skyX.beginPath(); skyX.moveTo(0,-S); skyX.lineTo(0,S); skyX.stroke();
    skyX.beginPath(); skyX.moveTo(-S*1.3,0); skyX.lineTo(S*1.3,0); skyX.stroke();
  }
  skyX.restore();
}

// ─── G1000 PFD ───────────────────────────────────────────────
function drawPFD(st,altFt,vsi,hdg){
  const W=pfdC.width,H=pfdC.height;
  pfdX.clearRect(0,0,W,H);
  pfdX.fillStyle='#0a0a0a'; pfdX.fillRect(0,0,W,H);

  const TAPE_W=Math.round(W*.088);
  const aiX=TAPE_W, aiY=0, aiW=W-TAPE_W*2, aiH=H;

  drawAI_PFD(pfdX,st.pitch,st.bank,st.eng,hdg||0,aiX,aiY,aiW,aiH);
  drawASI_tape(pfdX,st.ias,0,0,TAPE_W,aiH);
  drawALT_tape(pfdX,altFt,vsi,W-TAPE_W,0,TAPE_W,aiH);
  drawPFD_overlays(pfdX,st,altFt,vsi,W,H,TAPE_W,0,aiX,aiW,aiH);
}

function drawAI_PFD(ctx,pitch,bank,eng,hdg,x,y,w,h){
  ctx.save(); ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  ctx.save(); ctx.translate(x+w/2,y+h/2); ctx.rotate(bank*Math.PI/180);
  const pxPerDeg=h/50; // tighter pitch ladder — ±25° visible range
  const pOff=pitch*pxPerDeg; // positive pitch → horizon moves DOWN (more sky visible)
  // Sky — G1000 blue
  const skyGrad=ctx.createLinearGradient(0,-h*3+pOff,0,pOff);
  skyGrad.addColorStop(0,'#0d4f9e'); skyGrad.addColorStop(1,'#2390d4');
  ctx.fillStyle=skyGrad; ctx.fillRect(-w*2,-h*3+pOff,w*4,h*3);
  // Ground — G1000 brown
  const gndGrad=ctx.createLinearGradient(0,pOff,0,pOff+h*3);
  gndGrad.addColorStop(0,'#8b6610'); gndGrad.addColorStop(1,'#5a3f08');
  ctx.fillStyle=gndGrad; ctx.fillRect(-w*2,pOff,w*4,h*3);
  // Horizon
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(-w,pOff); ctx.lineTo(w,pOff); ctx.stroke();
  // Pitch lines — G1000 style: short tapered lines with numbers at 10° intervals
  ctx.font='bold 8px Courier New'; ctx.fillStyle='#fff';
  for(let p=-30;p<=30;p+=5){
    if(p===0) continue;
    const yy=pOff-p*pxPerDeg;
    if(Math.abs(yy)>h) continue;
    const isTen=p%10===0;
    const hw=isTen?w*.13:w*.07;
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=isTen?1.5:1;
    ctx.beginPath(); ctx.moveTo(-hw,yy); ctx.lineTo(hw,yy); ctx.stroke();
    if(isTen){
      ctx.fillText(Math.abs(p),hw+3,yy+3);
      ctx.fillText(Math.abs(p),-hw-15,yy+3);
    }
  }
  ctx.restore();
  // Fixed aircraft symbol
  ctx.strokeStyle='#fa0'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(x+w/2-50,y+h/2); ctx.lineTo(x+w/2-18,y+h/2); ctx.lineTo(x+w/2-18,y+h/2+10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+w/2+50,y+h/2); ctx.lineTo(x+w/2+18,y+h/2); ctx.lineTo(x+w/2+18,y+h/2+10); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,5,0,Math.PI*2); ctx.fillStyle='#fa0'; ctx.fill();
  // Bank arc
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x+w/2,y+h/2,h*.38,Math.PI*1.2,Math.PI*1.8); ctx.stroke();
  [-60,-45,-30,-20,-10,0,10,20,30,45,60].forEach(b=>{
    const a=-Math.PI/2+b*Math.PI/180;
    const r1=h*.38, r2=h*.38-(b%30===0?12:7);
    ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=b%30===0?1.5:1;
    ctx.beginPath();
    ctx.moveTo(x+w/2+Math.cos(a)*r1,y+h/2+Math.sin(a)*r1);
    ctx.lineTo(x+w/2+Math.cos(a)*r2,y+h/2+Math.sin(a)*r2); ctx.stroke();
  });
  // Bank pointer
  const ba=-Math.PI/2+bank*Math.PI/180, r=h*.38;
  const tx=x+w/2+Math.cos(ba)*r, ty=y+h/2+Math.sin(ba)*r;
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(tx,ty);
  ctx.lineTo(x+w/2+Math.cos(ba-.12)*r*.88,y+h/2+Math.sin(ba-.12)*r*.88);
  ctx.lineTo(x+w/2+Math.cos(ba+.12)*r*.88,y+h/2+Math.sin(ba+.12)*r*.88);
  ctx.closePath(); ctx.fill();

  // ── Slip/Skid Indicator (inclinometer) ──
  // Fixed below 12-o'clock position of the bank arc (always centered)
  const ssY=(y+h/2-r)+16; // just below 12-o'clock of bank arc
  const tubeW=32, tubeH=10, tubeR=5;
  const tubeCX=x+w/2, tubeCY=ssY+tubeH/2;
  // Tube background (rounded rect via arc)
  function rrect(lx,ly,lw,lh,lr){
    ctx.beginPath();
    ctx.moveTo(lx+lr,ly);
    ctx.lineTo(lx+lw-lr,ly); ctx.arcTo(lx+lw,ly,lx+lw,ly+lr,lr);
    ctx.lineTo(lx+lw,ly+lh-lr); ctx.arcTo(lx+lw,ly+lh,lx+lw-lr,ly+lh,lr);
    ctx.lineTo(lx+lr,ly+lh); ctx.arcTo(lx,ly+lh,lx,ly+lh-lr,lr);
    ctx.lineTo(lx,ly+lr); ctx.arcTo(lx,ly,lx+lr,ly,lr);
    ctx.closePath();
  }
  const tlx=tubeCX-tubeW/2-tubeR, tly=ssY, tlw=tubeW+tubeR*2, tlh=tubeH;
  ctx.fillStyle='rgba(0,0,0,0.6)'; rrect(tlx,tly,tlw,tlh,tubeR); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1; rrect(tlx,tly,tlw,tlh,tubeR); ctx.stroke();
  // Center mark
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(tubeCX,ssY+2); ctx.lineTo(tubeCX,ssY+tubeH-2); ctx.stroke();
  // Ball deflection:
  // For engine-fail maneuvers, rudder/bank coordination needed; ball deflects proportional to bank
  // In coordinated flight (BOTH engines) ball stays centered
  let ballOffset=0;
  if(eng==='FAIL'){
    // Ball deflects toward the dead engine side (opposite of applied bank)
    // Max deflection ~14px at 0° bank; centers as bank reaches ~5°
    ballOffset=Math.max(-tubeW/2, Math.min(tubeW/2, -bank*2.8));
  }
  // Draw ball
  const ballX=tubeCX+ballOffset;
  ctx.beginPath(); ctx.arc(ballX, tubeCY, tubeH/2-1, 0, Math.PI*2);
  ctx.fillStyle=Math.abs(ballOffset)<3?'#fff':'#f66';
  ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1; ctx.stroke();

  // ── Mini HSI compass rose overlay (in lower brown section) ──
  drawMiniHSI(ctx, hdg, x, y, w, h);

  ctx.restore();
}

function drawMiniHSI(ctx, hdg, aiX, aiY, aiW, aiH){
  const cx = aiX + aiW/2;
  // Center the mini HSI in the lower brown area (~73% down the AI)
  const cy = aiY + aiH * 0.75;
  const r  = Math.min(aiW * 0.22, aiH * 0.18);
  const hdgNorm = ((hdg%360)+360)%360;
  const CARDINALS = {0:'N',90:'E',180:'S',270:'W'};

  ctx.save();
  // Clip to a circle
  ctx.beginPath(); ctx.arc(cx, cy, r+2, 0, Math.PI*2); ctx.clip();

  // Background
  ctx.fillStyle='rgba(10,8,0,0.72)';
  ctx.beginPath(); ctx.arc(cx, cy, r+2, 0, Math.PI*2); ctx.fill();

  // Tick marks + labels
  for(let deg=0; deg<360; deg+=5){
    const isThirty=deg%30===0, isTen=deg%10===0, isCard=deg%90===0;
    const ang=((deg-hdgNorm)-90)*Math.PI/180;
    const tickLen=isThirty?r*.18:isTen?r*.12:r*.07;
    const ox=cx+Math.cos(ang)*r, oy=cy+Math.sin(ang)*r;
    const ix=cx+Math.cos(ang)*(r-tickLen), iy=cy+Math.sin(ang)*(r-tickLen);
    ctx.strokeStyle=isCard?'#fff':'#777';
    ctx.lineWidth=isThirty?1.5:1;
    ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ix,iy); ctx.stroke();
    if(isThirty){
      const lbl=CARDINALS[deg]||(deg/10).toString();
      const lx=cx+Math.cos(ang)*(r-tickLen-r*.18);
      const ly=cy+Math.sin(ang)*(r-tickLen-r*.18);
      ctx.fillStyle=isCard?'#fff':'#aaa';
      ctx.font=isCard?`bold ${Math.round(r*.22)}px Courier New`:`${Math.round(r*.19)}px Courier New`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lbl,lx,ly);
    }
  }

  // Rose ring
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();

  // Course pointer (magenta)
  const courseAng=-Math.PI/2;
  ctx.strokeStyle='#ff44ff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(courseAng)*r*.85, cy+Math.sin(courseAng)*r*.85);
  ctx.lineTo(cx+Math.cos(courseAng)*r*.3, cy+Math.sin(courseAng)*r*.3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(courseAng)*r*.85, cy+Math.sin(courseAng)*r*.85);
  ctx.lineTo(cx+Math.cos(courseAng-.28)*r*.72, cy+Math.sin(courseAng-.28)*r*.72);
  ctx.lineTo(cx+Math.cos(courseAng+.28)*r*.72, cy+Math.sin(courseAng+.28)*r*.72);
  ctx.closePath(); ctx.fillStyle='#ff44ff'; ctx.fill();
  // Tail
  const tailAng=courseAng+Math.PI;
  ctx.strokeStyle='#ff44ff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(cx+Math.cos(tailAng)*r*.85, cy+Math.sin(tailAng)*r*.85);
  ctx.lineTo(cx+Math.cos(tailAng)*r*.3, cy+Math.sin(tailAng)*r*.3);
  ctx.stroke();

  // Lubber line at top
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(cx, cy-r);
  ctx.lineTo(cx-3.5, cy-r-7);
  ctx.lineTo(cx+3.5, cy-r-7);
  ctx.closePath(); ctx.fill();

  // Aircraft symbol (white, tiny)
  const as=r*.14;
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx,cy-as*.8); ctx.lineTo(cx,cy+as*.6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-as*1.1,cy); ctx.lineTo(cx+as*1.1,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-as*.5,cy+as*.5); ctx.lineTo(cx+as*.5,cy+as*.5); ctx.stroke();

  // Heading readout box
  const hdgStr=Math.round(hdgNorm).toString().padStart(3,'0')+'°';
  const bw=38, bh=14;
  ctx.fillStyle='#000'; ctx.fillRect(cx-bw/2, cy-r*.38, bw, bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(cx-bw/2, cy-r*.38, bw, bh);
  ctx.fillStyle='#fff'; ctx.font=`bold ${Math.round(r*.21)}px Courier New`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(hdgStr, cx, cy-r*.38+bh/2);

  ctx.restore();
}

function drawASI_tape(ctx,ias,x,y,w,h){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(x,y,w,h);
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  const midY=y+h/2, pxPerKt=h/80;
  const fTick=`${Math.max(7,Math.round(w*.28))}px Courier New`;
  const fVal=`bold ${Math.max(9,Math.round(w*.36))}px Courier New`;
  const fBug=`${Math.max(6,Math.round(w*.22))}px Courier New`;
  const bh=Math.max(16,Math.round(w*.55));
  // Color bands
  const bands=[{lo:0,hi:62,c:'rgba(200,0,0,0.4)'},{lo:62,hi:72,c:'rgba(255,255,0,0.25)'},{lo:72,hi:122,c:'rgba(0,255,0,0.15)'},{lo:122,hi:200,c:'rgba(255,200,0,0.2)'}];
  bands.forEach(b=>{
    const y1=midY-(b.hi-ias)*pxPerKt, y2=midY-(b.lo-ias)*pxPerKt;
    ctx.fillStyle=b.c; ctx.fillRect(x,y1,w*.18,y2-y1);
  });
  // Ticks
  ctx.strokeStyle='#ccc'; ctx.font=fTick; ctx.fillStyle='#ddd';
  for(let v=0;v<=200;v+=10){
    const vy=midY-(v-ias)*pxPerKt;
    if(vy<y-5||vy>y+h+5) continue;
    ctx.lineWidth=v%20===0?1.5:1;
    ctx.beginPath(); ctx.moveTo(x+w*.6,vy); ctx.lineTo(x+w*.85,vy); ctx.stroke();
    if(v%20===0) ctx.fillText(v,x+2,vy+4);
  }
  // Speed bugs
  [{v:72,c:'#4af',l:'Vx'},{v:84,c:'#0f0',l:'Vy'}].forEach(bug=>{
    const vy=midY-(bug.v-ias)*pxPerKt;
    if(vy>y&&vy<y+h){
      ctx.strokeStyle=bug.c; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+w*.85,vy); ctx.lineTo(x+w,vy); ctx.stroke();
      ctx.fillStyle=bug.c; ctx.font=fBug; ctx.fillText(bug.l,x+w*.65,vy-2);
    }
  });
  // Current speed box
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(x,midY-bh/2,w,bh);
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1; ctx.strokeRect(x,midY-bh/2,w,bh);
  ctx.fillStyle='#fff'; ctx.font=fVal; ctx.textAlign='center';
  ctx.fillText(Math.max(0,Math.round(ias)),x+w/2,midY+bh*.35);
  ctx.textAlign='left';
  ctx.restore();
}

function drawALT_tape(ctx,alt,vsi,x,y,w,h){
  ctx.save(); ctx.fillStyle='rgba(0,0,0,0.82)'; ctx.fillRect(x,y,w,h);
  ctx.beginPath(); ctx.rect(x,y,w,h); ctx.clip();
  const midY=y+h/2, pxPerFt=h/2000;
  const fTick=`${Math.max(7,Math.round(w*.28))}px Courier New`;
  const fVal=`bold ${Math.max(9,Math.round(w*.32))}px Courier New`;
  const fVsi=`${Math.max(6,Math.round(w*.24))}px Courier New`;
  const bh=Math.max(16,Math.round(w*.55));
  ctx.strokeStyle='#ccc'; ctx.font=fTick; ctx.fillStyle='#ddd';
  for(let v=-500;v<=10000;v+=100){
    const vy=midY-(v-alt)*pxPerFt;
    if(vy<y-5||vy>y+h+5) continue;
    ctx.lineWidth=v%500===0?1.5:1;
    ctx.beginPath(); ctx.moveTo(x+w*.12,vy); ctx.lineTo(x+w*.38,vy); ctx.stroke();
    if(v%500===0) ctx.fillText(v,x+w*.4,vy+4);
  }
  // Current alt box
  ctx.fillStyle='rgba(0,0,0,0.9)'; ctx.fillRect(x,midY-bh/2,w,bh);
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1; ctx.strokeRect(x,midY-bh/2,w,bh);
  ctx.fillStyle='#fff'; ctx.font=fVal; ctx.textAlign='center';
  ctx.fillText(Math.round(alt/10)*10,x+w/2,midY+bh*.35);
  ctx.textAlign='left';
  // VSI
  const vsiC=vsi>100?'#4af':vsi<-100?'#f84':'#aaa';
  ctx.fillStyle=vsiC; ctx.font=fVsi; ctx.textAlign='center';
  ctx.fillText((vsi>=0?'+':'')+Math.round(vsi/100)*100,x+w/2,midY-bh*.7);
  ctx.textAlign='left';
  ctx.restore();
}

function drawHSI_arc(ctx,hdg,y,W,H){
  ctx.save();
  ctx.fillStyle='#100c00'; ctx.fillRect(0,y,W,H);
  ctx.beginPath(); ctx.rect(0,y,W,H); ctx.clip();

  const hdgNorm=((hdg%360)+360)%360;
  const cx=W/2;
  const cy=y+H*0.58;
  const r=Math.min(W*0.38, H*0.82);
  const CARDINALS={0:'N',90:'E',180:'S',270:'W'};

  // ── Compass rose circle ──
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke();

  // ── Rotating tick marks + upright labels ──
  for(let deg=0;deg<360;deg+=5){
    const isThirty=deg%30===0, isTen=deg%10===0, isCard=deg%90===0;
    // Screen angle: current heading rotates to 12-o'clock (-π/2)
    const ang=((deg-hdgNorm)-90)*Math.PI/180;
    const tickLen=isThirty?r*.16:isTen?r*.10:r*.06;
    const ox=cx+Math.cos(ang)*r, oy=cy+Math.sin(ang)*r;
    const ix=cx+Math.cos(ang)*(r-tickLen), iy=cy+Math.sin(ang)*(r-tickLen);
    ctx.strokeStyle=isCard?'#fff':'#888';
    ctx.lineWidth=isThirty?1.8:1;
    ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ix,iy); ctx.stroke();
    if(isThirty){
      const lbl=CARDINALS[deg]||(deg/10).toString();
      const lx=cx+Math.cos(ang)*(r-tickLen-r*.12);
      const ly=cy+Math.sin(ang)*(r-tickLen-r*.12);
      ctx.fillStyle=isCard?'#fff':'#bbb';
      ctx.font=isCard?'bold 11px Courier New':'9px Courier New';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(lbl,lx,ly);
    }
  }

  // ── Course pointer (magenta) — simple needle through center ──
  // Defaults to 0° offset (same as heading); replace with course param later
  const courseAng=-Math.PI/2; // points up (on-course = aligned with heading)
  ctx.strokeStyle='#ff44ff'; ctx.lineWidth=2;
  // Head arrow
  const hx=cx+Math.cos(courseAng)*r*.88, hy=cy+Math.sin(courseAng)*r*.88;
  const hx2=cx+Math.cos(courseAng)*r*.28, hy2=cy+Math.sin(courseAng)*r*.28;
  ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(hx2,hy2); ctx.stroke();
  // Arrowhead
  const ahAng=courseAng+Math.PI;
  ctx.beginPath();
  ctx.moveTo(hx,hy);
  ctx.lineTo(cx+Math.cos(courseAng-.25)*r*.76,cy+Math.sin(courseAng-.25)*r*.76);
  ctx.lineTo(cx+Math.cos(courseAng+.25)*r*.76,cy+Math.sin(courseAng+.25)*r*.76);
  ctx.closePath(); ctx.fillStyle='#ff44ff'; ctx.fill();
  // Tail
  const tx=cx+Math.cos(ahAng)*r*.88, ty=cy+Math.sin(ahAng)*r*.88;
  ctx.strokeStyle='#ff44ff';
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(cx+Math.cos(ahAng)*r*.28,cy+Math.sin(ahAng)*r*.28); ctx.stroke();

  // ── Lubber line at top (fixed, white) ──
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.moveTo(cx,cy-r);
  ctx.lineTo(cx-5,cy-r-10);
  ctx.lineTo(cx+5,cy-r-10);
  ctx.closePath(); ctx.fill();

  // ── Aircraft symbol (white, center) ──
  const as=r*.17;
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx,cy-as*.9); ctx.lineTo(cx,cy+as*.7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-as*1.25,cy+as*.05); ctx.lineTo(cx+as*1.25,cy+as*.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-as*.55,cy+as*.6); ctx.lineTo(cx+as*.55,cy+as*.6); ctx.stroke();

  // ── Heading readout box (above aircraft, inside rose) ──
  const hdgStr=Math.round(hdgNorm).toString().padStart(3,'0')+'°';
  const bw=50,bh=19;
  ctx.fillStyle='#000'; ctx.fillRect(cx-bw/2,cy-r*.44,bw,bh);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(cx-bw/2,cy-r*.44,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 12px Courier New';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(hdgStr,cx,cy-r*.44+bh/2);

  // ── HDG label (cyan, left) ──
  ctx.fillStyle='#00ffff'; ctx.font='bold 9px Courier New';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('HDG '+Math.round(hdgNorm).toString().padStart(3,'0')+'°', 4, y+3);

  // ── CRS label (magenta, right) ──
  ctx.fillStyle='#ff44ff'; ctx.font='bold 9px Courier New';
  ctx.textAlign='right';
  ctx.fillText('CRS 360°', W-4, y+3);

  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawPFD_overlays(ctx,st,alt,vsi,W,H,TW,HH,aiX,aiW,aiH){
  // Gear / Flap / Eng status strip at bottom-left of AI
  const sx=aiX+6, sy=aiH-36;
  ctx.font='bold 11px Courier New';
  ctx.fillStyle=st.gear==='DOWN'?'#0f0':'#888';
  ctx.fillText('G:'+(st.gear==='DOWN'?'DN':'UP'),sx,sy);
  ctx.fillStyle=st.flaps==='UP'?'#888':st.flaps==='TO'?'#fa0':'#4af';
  ctx.fillText('F:'+st.flaps,sx+52,sy);
  if(st.eng==='FAIL'){ ctx.fillStyle='#f44'; ctx.fillText('S/E',sx+110,sy); }
  // MP readout top-right of AI
  ctx.fillStyle='#0f0'; ctx.font='11px Courier New';
  ctx.fillText('MP '+st.mp.toFixed(0)+'"',aiX+aiW-70,18);
}

// ─── MFD ─────────────────────────────────────────────────────
function switchMFD(tab){
  mfdPage=tab;
  document.querySelectorAll('.mfd-tab').forEach(e=>e.classList.toggle('active',e.dataset.tab===tab));
  renderMFD();
}

function renderMFD(){
  const body=document.getElementById('mfd-body');
  if(mfdPage==='steps')  { body.innerHTML=buildStepsHTML(); return; }
  if(mfdPage==='normal') { body.innerHTML=buildChecklistHTML('normal'); return; }
  if(mfdPage==='emg')    { body.innerHTML=buildChecklistHTML('emg'); return; }
}


function buildRightSteps(m){
  if(!m) return '';
  return m.keyframes.map((kf,i)=>`<div class="rp-step" id="rp-step-${i}">${kf.callout}</div>`).join('');
}
function updateRightSteps(m,t){
  const k=m.keyframes;
  k.forEach((kf,i)=>{
    const el=document.getElementById('rp-step-'+i); if(!el) return;
    const nxt=k[i+1];
    const isCur=t>=kf.t&&(!nxt||t<nxt.t), isDone=nxt&&t>=nxt.t;
    el.className='rp-step'+(isCur?' current':isDone?' done':'');
    if(isCur) el.scrollIntoView({block:'nearest',behavior:'smooth'});
  });
}

function buildChecklistHTML(mode){
  const isNorm = mode === 'normal';
  const list = isNorm ? CL_NORMAL : CL_EMERGENCY;
  const hdrCol = isNorm ? '#4af' : '#f66';
  const panels = list.map(p=>`
    <div class="cl-panel-mfd${isNorm?'':' emg'}">
      <div class="cl-ptitle${isNorm?'':' emg'}">${isNorm?'':'⚠ '}${p.title}</div>
      ${p.items.map((it,i)=>`<div class="cl-step${isNorm?'':' emg'}"><span class="cl-num">${i+1}.</span><span>${it}</span></div>`).join('')}
    </div>`).join('');
  return panels;
}

// ─── GEAR INDICATOR ──────────────────────────────────────────
function updateGearIndicator(gear){
  const down = gear === 'DOWN';
  ['gear-nose','gear-left','gear-right'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.className = 'gear-dot' + (down ? ' green' : '');
  });
}

// ─── FLAP LEVER ──────────────────────────────────────────────
function updateFlapLever(flaps){
  const bar = document.getElementById('flap-bar');
  const lbl = document.getElementById('flap-bar-label');
  if(!bar || !lbl) return;
  const pos = {UP:0, TO:19, FULL:38};
  lbl.textContent = flaps;
  bar.style.top = (pos[flaps] ?? 0) + 'px';
}

// ─── PLAYBACK ────────────────────────────────────────────────
function playAnim(){
  if(selIdx<0) return;
  playing=true; document.getElementById('btn-play').classList.add('active');
  animStart=performance.now()-animTime*1000; step();
}
function step(){
  if(!playing) return;
  const m=MANEUVERS[selIdx];
  animTime=(performance.now()-animStart)/1000;
  if(animTime>=m.duration){ animTime=m.duration; renderFrame(m,animTime); stopAnim(); return; }
  renderFrame(m,animTime);
  rafId=requestAnimationFrame(step);
}
function stopAnim(){
  playing=false; cancelAnimationFrame(rafId);
  document.getElementById('btn-play').classList.remove('active');
}
document.getElementById('btn-play').addEventListener('click',()=>{
  if(selIdx<0) return;
  if(playing){stopAnim();return;}
  const m=MANEUVERS[selIdx];
  if(animTime>=m.duration){animTime=0;trailPts=[];
    const rpS=document.getElementById('rp-steps');
    if(rpS) rpS.innerHTML=buildRightSteps(m);
  }
  playAnim();
});
document.getElementById('btn-fs').addEventListener('click',toggleFullscreen);
document.getElementById('btn-stop').addEventListener('click',()=>{
  stopAnim();
  if(selIdx>=0){animTime=0;trailPts=[];renderFrame(MANEUVERS[selIdx],0);}
});

// ─── RESIZE ──────────────────────────────────────────────────
function scaleApp(){
  // App fills viewport via CSS — no transform needed
  document.getElementById('app').style.transform='';
}
function resize(){
  scaleApp();
  const tr=document.getElementById('top-half').getBoundingClientRect();
  skyC.width=tr.width; skyC.height=tr.height;
  // pfd-canvas is absolutely positioned inside bezel — use its rendered size
  const pr=pfdC.getBoundingClientRect();
  pfdC.width=Math.round(pr.width); pfdC.height=Math.round(pr.height);
  if(selIdx>=0) renderFrame(MANEUVERS[selIdx],animTime);
  else drawPFD({pitch:0,bank:0,ias:0,mp:0,gear:'UP',flaps:'UP',eng:'BOTH'},0,0,0);
}
window.addEventListener('resize',resize);
// Wait for bezel PNGs to load so canvas gets correct dimensions
const bezelImg = document.querySelector('.bezel-img');
if(bezelImg && !bezelImg.complete) { bezelImg.onload = ()=>{ resize(); }; }
resize();

mfdPage='normal';
renderMFD();
selectManeuver(0);
</script>
