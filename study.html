<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Study Hub</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #08080a;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  color: #ccc;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
}

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 48px;
}
header h1 {
  font-size: clamp(22px, 5vw, 36px);
  letter-spacing: 8px;
  color: #fff;
  font-weight: normal;
}
header p {
  font-size: 11px;
  letter-spacing: 3px;
  color: #333;
  margin-top: 8px;
}
header .back-link {
  display: inline-block;
  margin-top: 16px;
  font-size: 10px;
  letter-spacing: 2px;
  color: #333;
  text-decoration: none;
  transition: color 0.15s;
}
header .back-link:hover { color: #4af; }

/* ── GRID ── */
#study-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  width: 100%;
  max-width: 700px;
}

/* ── SECTION CARD ── */
.tool-card {
  background: #0d0d10;
  border: 1px solid #1e1e22;
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.tool-card-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid #1a1a1e;
}
.tool-card-icon {
  font-size: 20px;
  margin-bottom: 8px;
  color: #4af;
}
.tool-card-title {
  font-size: 13px;
  letter-spacing: 4px;
  color: #fff;
  font-weight: normal;
}
.tool-card-desc {
  font-size: 10px;
  letter-spacing: 1px;
  color: #444;
  margin-top: 5px;
  line-height: 1.5;
}

/* ── BUTTONS ── */
.ac-list {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}
.ac-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: #0a0a0d;
  border: 1px solid #252528;
  border-radius: 6px;
  color: #aaa;
  text-decoration: none;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  letter-spacing: 1px;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  cursor: pointer;
}
.ac-btn:hover {
  border-color: #4af;
  background: #0a1520;
  color: #fff;
}
.ac-btn:hover .ac-arrow { color: #4af; }
.ac-btn.disabled {
  opacity: 0.28;
  pointer-events: none;
  cursor: default;
}
.ac-btn-name { flex: 1; }
.ac-btn-sub  { font-size: 9px; color: #333; letter-spacing: 1px; margin-right: 10px; }
.ac-arrow    { color: #333; font-size: 13px; transition: color 0.15s; }

/* ── MOBILE ── */
@media (max-width: 600px) {
  #study-grid {
    grid-template-columns: 1fr;
    max-width: 480px;
  }
  header { margin-bottom: 32px; }
  body { justify-content: flex-start; padding-top: 48px; }
}
</style>
</head>
<body>

<header>
  <h1>STUDY HUB</h1>
  <p>SELECT A CATEGORY TO BEGIN</p>
  <a class="back-link" href="index.html">← HOME</a>
</header>

<div id="study-grid">

  <!-- AIRCRAFT -->
  <div class="tool-card">
    <div class="tool-card-header">
      <div class="tool-card-icon">✈</div>
      <div class="tool-card-title">AIRCRAFT</div>
      <div class="tool-card-desc">V-speeds, systems, checklists &amp; flashcards</div>
    </div>
    <div class="ac-list">
      <a class="ac-btn" href="p2006t_study.html">
        <span class="ac-btn-name">Tecnam P2006T</span>
        <span class="ac-btn-sub">TWIN · G1000</span>
        <span class="ac-arrow">›</span>
      </a>
      <span class="ac-btn disabled">
        <span class="ac-btn-name">Cessna 172</span>
        <span class="ac-btn-sub">COMING SOON</span>
        <span class="ac-arrow">›</span>
      </span>
      <span class="ac-btn disabled">
        <span class="ac-btn-name">Cessna 152</span>
        <span class="ac-btn-sub">COMING SOON</span>
        <span class="ac-arrow">›</span>
      </span>
    </div>
  </div>

  <!-- RESOURCES -->
  <div class="tool-card">
    <div class="tool-card-header">
      <div class="tool-card-icon">◉</div>
      <div class="tool-card-title">RESOURCES</div>
      <div class="tool-card-desc">Mnemonics, regulations &amp; general knowledge</div>
    </div>
    <div class="ac-list">
      <a class="ac-btn" href="mnemonics.html">
        <span class="ac-btn-name">Mnemonics</span>
        <span class="ac-btn-sub">14 AIDS</span>
        <span class="ac-arrow">›</span>
      </a>
      <a class="ac-btn" href="general_knowledge.html">
        <span class="ac-btn-name">General Knowledge</span>
        <span class="ac-btn-sub">REGS · AIRSPACE</span>
        <span class="ac-arrow">›</span>
      </a>
    </div>
  </div>

</div>

</body>
</html>
